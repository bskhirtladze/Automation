version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    privileged: true
    user: root
    ports:
      - "8080:8080"     # Jenkins UI
      - "50000:50000"   # Agent port
    volumes:
      - jenkins_home:/var/jenkins_home                    # persist Jenkins data
      - /var/run/docker.sock:/var/run/docker.sock         # allow Jenkins to use host Docker
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false  # skip setup wizard (optional)

volumes:
  jenkins_home:
    driver: local